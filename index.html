<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00f2ff">
    <title>Smart Voice Alarm 2026</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">


<link rel="icon" href="./icons/favicon.ico">
<link rel="manifest" href="./manifest/site.webmanifest">
</head>
<body>
    <div class="app-container">
        <header class="top-bar">
            <span>NEON SYSTEM • V2.7</span>
            <button id="help-btn" class="help-btn">?</button>
        </header>

        <main class="clock-display-center">
            <div class="clock-wrapper">
                <div id="clock">00:00</div>
                <div id="seconds">00</div>
            </div>
            <p id="command-display">ESPERANDO VOZ</p>
        </main>

        <section class="alarms-container">
            <div class="section-title">ALARMAS PROGRAMADAS</div>
            <ul id="alarms-list"></ul>
        </section>

        <footer class="bottom-controls">
            <div class="setting-item">
                <label>AUDIO ENGINE</label>
                <select id="tone-select">
                    <option value="assets/alarma1.mp3">🔊 CLÁSICO</option>
                    <option value="assets/alarma2.mp3">🛰️ DIGITAL</option>
                    <option value="assets/alarma3.mp3">🧬 NEÓN PRO</option>
                </select>
            </div>

            <div class="mic-section">
                <div class="mic-wrapper" id="mic-wrapper">
                    <button id="mic-btn" class="btn-mic">🎤</button>
                    <div class="mic-ring"></div>
                </div>
            </div>
        </footer>

        <div id="modal-help" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h3>GUÍA DE VOZ</h3>
                <div class="help-list">
                    <p>• "Alarma mañana 7 am"</p>
                    <p>• "Alarma 20 de mayo 10:00 pm"</p>
                    <p>• "Alarma diaria 6:30 am"</p>
                </div>
                <p class="stop-hint">DI "DETENER" PARA APAGAR</p>
            </div>
        </div>
    </div>
    <audio id="alarm-audio" preload="auto" loop></audio>
    <script src="script.js"></script>
</body>
</html>
